name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Frontend — lint, typecheck, test, build (Node 20)
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Type check
        run: pnpm turbo typecheck

      - name: Test
        run: pnpm turbo test

      - name: Build
        run: pnpm turbo build

  # ---------------------------------------------------------------------------
  # Backend — lint (ruff) + pytest (Python 3.11)
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: threatdex
          POSTGRES_PASSWORD: threatdex
          POSTGRES_DB: threatdex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install Python dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Lint with Ruff
        run: ruff check apps/api workers

      - name: Install worker shared dependencies
        run: pip install sqlalchemy requests

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://threatdex:threatdex@localhost:5432/threatdex_test
          REDIS_URL: redis://localhost:6379
          ADMIN_SECRET: ci-test-secret
        run: |
          pytest apps/api/tests \
            workers/shared/tests \
            workers/mitre-sync/tests \
            workers/etda-sync/tests \
            workers/otx-sync/tests \
            workers/image-gen/tests \
            workers/misp-sync/tests \
            workers/opencti-sync/tests \
            --cov=apps/api \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
