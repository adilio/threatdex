version: "3.8"

# =============================================================================
# ThreatDex — Local Full-Stack Environment
# =============================================================================
# Usage:
#   cp .env.example .env          # fill in your values
#   docker compose up             # start all services
#   docker compose up -d          # start detached
#   docker compose logs -f api    # tail a specific service
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: threatdex
      POSTGRES_PASSWORD: threatdex
      POSTGRES_DB: threatdex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatdex -d threatdex"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # FastAPI — backend API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://threatdex:threatdex@postgres:5432/threatdex
      REDIS_URL: redis://redis:6379
    volumes:
      - ../apps/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ---------------------------------------------------------------------------
  # Next.js 14 — frontend web app
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    volumes:
      - ../apps/web:/app
      - /app/node_modules
      - /app/.next
    command: pnpm dev

  # ---------------------------------------------------------------------------
  # Celery worker — background tasks (image gen, data sync)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://threatdex:threatdex@postgres:5432/threatdex
      REDIS_URL: redis://redis:6379
    volumes:
      - ../apps/api:/app
    command: celery -A celery_app worker --loglevel=info

volumes:
  postgres_data:
    driver: local
