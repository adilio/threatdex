name: Nightly Data Sync

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Data source to sync"
        required: false
        default: "all"
        type: choice
        options:
          - mitre
          - etda
          - otx
          - all

jobs:
  sync:
    name: Sync ${{ inputs.source || 'all' }}
    runs-on: ubuntu-latest
    env:
      OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync MITRE ATT&CK
        if: inputs.source == 'mitre' || inputs.source == 'all' || github.event_name == 'schedule'
        run: pnpm workers:mitre
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Sync ETDA
        if: inputs.source == 'etda' || inputs.source == 'all' || github.event_name == 'schedule'
        run: pnpm workers:etda
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Sync OTX
        if: (inputs.source == 'otx' || inputs.source == 'all' || github.event_name == 'schedule') && env.OTX_API_KEY != ''
        run: pnpm workers:otx
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
