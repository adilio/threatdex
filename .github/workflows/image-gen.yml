name: Image Generation

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max images to generate per run"
        required: false
        default: "20"
        type: string
      force:
        description: "Regenerate even if image already exists"
        required: false
        default: false
        type: boolean

jobs:
  generate:
    name: Generate hero images
    runs-on: ubuntu-latest
    env:
      HF_API_KEY: ${{ secrets.HF_API_KEY }}
      HF_IMAGE_MODEL: black-forest-labs/FLUX.1-schnell
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate images
        if: env.HF_API_KEY != ''
        run: pnpm workers:image --provider huggingface --limit ${{ inputs.limit || '20' }} ${{ inputs.force && '--force' || '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
